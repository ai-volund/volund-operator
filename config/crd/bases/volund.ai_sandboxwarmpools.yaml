apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sandboxwarmpools.volund.ai
spec:
  group: volund.ai
  names:
    kind: SandboxWarmPool
    listKind: SandboxWarmPoolList
    plural: sandboxwarmpools
    singular: sandboxwarmpool
    shortNames:
      - sbpool
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Available
          type: integer
          jsonPath: .status.available
        - name: Active
          type: integer
          jsonPath: .status.active
        - name: Desired
          type: integer
          jsonPath: .spec.replicas
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: SandboxWarmPool maintains pre-warmed sandbox pods for fast allocation.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - replicas
                - templateRef
              properties:
                replicas:
                  type: integer
                  format: int32
                  description: Replicas is the target number of warm (unclaimed) sandbox pods.
                  default: 2
                  minimum: 0
                templateRef:
                  type: string
                  description: TemplateRef references the SandboxTemplate to use for creating sandbox pods.
                minReplicas:
                  type: integer
                  format: int32
                  description: MinReplicas for HPA scaling (optional).
                maxReplicas:
                  type: integer
                  format: int32
                  description: MaxReplicas for HPA scaling (optional).
                shutdownTimeoutSeconds:
                  type: integer
                  format: int32
                  description: ShutdownTimeoutSeconds is the maximum lifetime per sandbox pod.
            status:
              type: object
              properties:
                available:
                  type: integer
                  format: int32
                  description: Available is the count of warm (unclaimed) pods.
                active:
                  type: integer
                  format: int32
                  description: Active is the count of claimed (in-use) pods.
                total:
                  type: integer
                  format: int32
                  description: Total is Available + Active.
