---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentinstances.volund.ai
  annotations:
    controller-gen.kubebuilder.io/version: "(hand-written)"
spec:
  group: volund.ai
  names:
    kind: AgentInstance
    listKind: AgentInstanceList
    plural: agentinstances
    singular: agentinstance
    shortNames:
      - ai
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: State
          type: string
          jsonPath: .status.state
        - name: Pool
          type: string
          jsonPath: .spec.poolName
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          description: >-
            AgentInstance represents a single agent pod - warm, active,
            or being recycled. The pool controller creates and manages these.
          type: object
          required:
            - spec
          properties:
            apiVersion:
              description: >-
                APIVersion defines the versioned schema of this representation
                of an object.
              type: string
            kind:
              description: >-
                Kind is a string value representing the REST resource this
                object represents.
              type: string
            metadata:
              type: object
            spec:
              description: >-
                AgentInstanceSpec is the desired state for a single agent pod.
              type: object
              required:
                - poolName
                - tenantId
                - image
                - llmRouterAddr
              properties:
                poolName:
                  description: >-
                    PoolName is the AgentWarmPool that owns this instance.
                  type: string
                tenantId:
                  description: >-
                    TenantID identifies which tenant this agent belongs to.
                  type: string
                profileId:
                  description: >-
                    ProfileID is the agent profile injected at claim time.
                  type: string
                image:
                  description: >-
                    Image is the container image for this agent pod.
                  type: string
                llmRouterAddr:
                  description: >-
                    LLMRouterAddr is the gRPC control-plane address.
                  type: string
                natsUrl:
                  description: >-
                    NATSUrl is the NATS address for events.
                  type: string
            status:
              description: >-
                AgentInstanceStatus is the observed state of a single agent pod.
              type: object
              properties:
                state:
                  description: >-
                    State is one of: pending, warm, active, terminating.
                  type: string
                  enum:
                    - pending
                    - warm
                    - active
                    - terminating
                podName:
                  description: PodName is the name of the managed Pod.
                  type: string
                claimedBy:
                  description: >-
                    ClaimedBy is the task or conversation ID that claimed
                    this instance.
                  type: string
                lastHeartbeat:
                  description: >-
                    LastHeartbeat is the last time the agent pod sent a heartbeat.
                  type: string
                  format: date-time
                conditions:
                  description: >-
                    Conditions holds standard Kubernetes condition types.
                  type: array
                  items:
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        description: >-
                          lastTransitionTime is the last time the condition
                          transitioned from one status to another.
                        type: string
                        format: date-time
                      message:
                        description: >-
                          message is a human readable message indicating
                          details about the transition.
                        type: string
                        maxLength: 32768
                      observedGeneration:
                        description: >-
                          observedGeneration represents the .metadata.generation
                          that the condition was set based upon.
                        type: integer
                        format: int64
                        minimum: 0
                      reason:
                        description: >-
                          reason contains a programmatic identifier indicating
                          the reason for the condition's last transition.
                        type: string
                        maxLength: 1024
                        minLength: 1
                        pattern: "^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$"
                      status:
                        description: status of the condition.
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      type:
                        description: >-
                          type of condition in CamelCase or in
                          foo.example.com/CamelCase.
                        type: string
                        maxLength: 316
                        pattern: "^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$"
