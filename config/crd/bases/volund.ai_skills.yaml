apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: skills.volund.ai
spec:
  group: volund.ai
  names:
    kind: Skill
    listKind: SkillList
    plural: skills
    singular: skill
    shortNames:
      - sk
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Author
          type: string
          jsonPath: .spec.author
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: Skill defines a reusable capability that can be attached to AgentProfiles.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - type
                - version
                - description
              properties:
                type:
                  type: string
                  description: How the skill is loaded at runtime.
                  enum:
                    - prompt
                    - mcp
                    - cli
                version:
                  type: string
                  description: Semantic version of the skill.
                description:
                  type: string
                  description: What this skill does.
                author:
                  type: string
                  description: Skill author or organization.
                tags:
                  type: array
                  description: Searchable labels for the skill registry.
                  items:
                    type: string
                parameters:
                  type: array
                  description: Input parameters this skill accepts.
                  items:
                    type: object
                    required:
                      - name
                      - type
                      - description
                    properties:
                      name:
                        type: string
                        description: Parameter name.
                      type:
                        type: string
                        description: "JSON Schema type (string, integer, number, boolean, array, object)."
                      description:
                        type: string
                        description: Parameter description for the LLM.
                      required:
                        type: boolean
                        description: Whether this parameter must be provided.
                prompt:
                  type: string
                  description: Markdown content injected into the system prompt. Required for type=prompt.
                runtime:
                  type: object
                  description: Container configuration for MCP server skills. Required for type=mcp.
                  required:
                    - image
                  properties:
                    image:
                      type: string
                      description: Container image running the MCP server.
                    mode:
                      type: string
                      description: Pod placement strategy.
                      enum:
                        - sidecar
                        - shared
                      default: sidecar
                    transport:
                      type: string
                      description: MCP communication protocol.
                      enum:
                        - stdio
                        - http-sse
                      default: stdio
                    resources:
                      type: object
                      description: CPU/memory for the skill container.
                      properties:
                        cpu:
                          type: string
                          description: "CPU request (e.g., 100m)."
                        memory:
                          type: string
                          description: "Memory request (e.g., 128Mi)."
                    auth:
                      type: object
                      description: Credential requirements for this skill.
                      required:
                        - type
                      properties:
                        type:
                          type: string
                          description: "Auth mechanism (e.g., oauth2, api-key)."
                        provider:
                          type: string
                          description: "OAuth provider name (e.g., github, slack)."
                        scopes:
                          type: array
                          description: OAuth scopes required.
                          items:
                            type: string
                cli:
                  type: object
                  description: CLI binary wrapper configuration. Required for type=cli.
                  required:
                    - binary
                    - allowedCommands
                  properties:
                    binary:
                      type: string
                      description: CLI executable name (must be in agent image PATH).
                    allowedCommands:
                      type: array
                      description: "Permitted subcommands (e.g., [pr view, pr list])."
                      items:
                        type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                      - reason
                      - message
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
