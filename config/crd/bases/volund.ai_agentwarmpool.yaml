---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentwarmpool.volund.ai
  annotations:
    controller-gen.kubebuilder.io/version: "(hand-written)"
spec:
  group: volund.ai
